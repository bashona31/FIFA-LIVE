<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Sports</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#050505;
    color:#fff;
}

.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:100;
    backdrop-filter:blur(20px);
    background:rgba(10,10,10,.8);
    border-bottom:1px solid rgba(255,255,255,.08);
}

.nav{
    max-width:1400px;
    margin:auto;
    padding:18px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:24px;
    font-weight:800;
}

.live-badge{
    background:#ff1f4b;
    color:#fff;
    padding:8px 15px;
    border-radius:50px;
    font-size:13px;
    font-weight:700;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{opacity:1}
    50%{opacity:.5}
    100%{opacity:1}
}

.hero{
    max-width:1400px;
    margin:auto;
    padding:100px 20px 30px;
}

.match-card{
    background:linear-gradient(
    135deg,
    rgba(255,255,255,.05),
    rgba(255,255,255,.02)
    );

    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    overflow:hidden;
    backdrop-filter:blur(25px);
}

.player-wrap{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    background:#000;
}

.player-wrap iframe{
    width:100%;
    height:100%;
    border:none;
}

.overlay{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    gap:10px;
}

.tag{
    padding:8px 14px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
    background:rgba(0,0,0,.6);
    backdrop-filter:blur(20px);
}

.live{
    background:#ff214f;
}

.content{
    padding:28px;
}

.league{
    color:#aaa;
    margin-bottom:10px;
}

.title{
    font-size:32px;
    font-weight:800;
}

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin-top:25px;
}

.stat{
    background:#101010;
    border:1px solid rgba(255,255,255,.05);
    padding:20px;
    border-radius:18px;
}

.stat small{
    color:#888;
}

.stat h3{
    margin-top:8px;
    font-size:20px;
}

@media(max-width:768px){

.title{
    font-size:24px;
}

.stats{
    grid-template-columns:1fr;
}

}
</style>
</head>

<body>

<header class="header">
    <div class="nav">
        <div class="logo">SPORTS LIVE</div>
        <div class="live-badge">● LIVE</div>
    </div>
</header>

<section class="hero">

<div class="match-card">

<div class="player-wrap">

<div class="overlay">
<div class="tag live">LIVE</div>
<div class="tag" id="league"></div>
</div>

<iframe
id="player"
allowfullscreen
allow="encrypted-media; picture-in-picture">
</iframe>

</div>

<div class="content">

<div class="league" id="leagueText"></div>

<h1 class="title" id="title"></h1>

<div class="stats">

<div class="stat">
<small>Status</small>
<h3 id="status"></h3>
</div>

<div class="stat">
<small>Quality</small>
<h3>HD Stream</h3>
</div>

<div class="stat">
<small>Platform</small>
<h3>Vercel</h3>
</div>

</div>

</div>

</div>

</section>

<script type="module">

import { STREAM } from './stream.js';

document.getElementById("player").src = STREAM.embedUrl;
document.getElementById("title").innerText = STREAM.title;
document.getElementById("status").innerText = STREAM.status;
document.getElementById("league").innerText = STREAM.league;
document.getElementById("leagueText").innerText = STREAM.league;

</script>

</body>
</html>
