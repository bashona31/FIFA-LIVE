<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
    --bg:#07080a;
    --panel:#121317;
    --panel-2:#1a1c21;
    --accent:#ff2d4e;
    --accent-2:#ffc400;
    --text:#f5f6f8;
    --text-dim:#8a8d95;
    --line:rgba(255,255,255,.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
}

/* ---------- header ---------- */
.header{
    position:fixed;
    top:0;left:0;width:100%;
    z-index:100;
    background:rgba(7,8,10,.85);
    backdrop-filter:blur(16px);
    border-bottom:1px solid var(--line);
}
.nav{
    max-width:1200px;
    margin:auto;
    padding:16px 24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.logo{
    font-family:'Oswald',sans-serif;
    font-size:22px;
    font-weight:700;
    letter-spacing:.5px;
    text-transform:uppercase;
    display:flex;
    align-items:center;
    gap:10px;
}
.logo .bar{
    width:6px;height:22px;
    background:var(--accent);
    clip-path:polygon(30% 0,100% 0,70% 100%,0 100%);
}
.air-badge{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--panel-2);
    border:1px solid var(--line);
    padding:7px 16px 7px 12px;
    clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%);
}
.air-dot{
    width:8px;height:8px;
    border-radius:50%;
    background:var(--accent);
    animation:pulse 1.6s ease-in-out infinite;
}
.air-badge span{
    font-family:'Oswald',sans-serif;
    font-size:12px;
    font-weight:600;
    letter-spacing:1.5px;
}
@keyframes pulse{
    0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(255,45,78,.5);}
    50%{opacity:.4;box-shadow:0 0 0 6px rgba(255,45,78,0);}
}
@media (prefers-reduced-motion:reduce){
    .air-dot{animation:none;}
}
.nav-right{
    display:flex;
    align-items:center;
    gap:10px;
}

/* ---------- telegram cta button (3D) ---------- */
.tg-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    letter-spacing:1px;
    text-transform:uppercase;
    text-decoration:none;
    color:#fff;
    background:linear-gradient(180deg,#4fc3ff 0%,#229ed9 55%,#1483c7 100%);
    border:1px solid #0f6fa8;
    border-radius:8px;
    cursor:pointer;
    transform:translateY(0);
    transition:transform .12s ease,box-shadow .12s ease,filter .12s ease;
}
.tg-btn svg{flex-shrink:0;}
.tg-btn:hover{filter:brightness(1.1);}
.tg-btn:hover,.tg-btn:active{animation-play-state:paused;}

@keyframes tg-float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-5px);}
}
@keyframes tg-glow-small{
    0%,100%{box-shadow:0 3px 0 #0c5f8f,0 6px 14px rgba(20,130,200,.35),0 0 0 rgba(79,195,255,0);}
    50%{box-shadow:0 3px 0 #0c5f8f,0 6px 14px rgba(20,130,200,.35),0 0 18px 5px rgba(79,195,255,.6);}
}
@keyframes tg-glow-large{
    0%,100%{box-shadow:0 6px 0 #0c5f8f,0 16px 30px rgba(20,130,200,.4),0 0 0 rgba(79,195,255,0);}
    50%{box-shadow:0 6px 0 #0c5f8f,0 16px 30px rgba(20,130,200,.4),0 0 32px 8px rgba(79,195,255,.65);}
}

.tg-btn.small{
    font-size:11px;
    padding:9px 14px;
    animation:tg-float 2.2s ease-in-out infinite,tg-glow-small 2.2s ease-in-out infinite;
}
.tg-btn.small svg{width:14px;height:14px;}
.tg-btn.small:active{
    transform:translateY(3px);
    box-shadow:0 0 0 #0c5f8f,0 2px 6px rgba(20,130,200,.3);
}

.tg-btn.large{
    font-size:15px;
    padding:16px 38px;
    border-radius:10px;
    animation:tg-float 2.6s ease-in-out infinite,tg-glow-large 2.6s ease-in-out infinite;
}
.tg-btn.large svg{width:18px;height:18px;}
.tg-btn.large:active{
    transform:translateY(6px);
    box-shadow:0 0 0 #0c5f8f,0 4px 10px rgba(20,130,200,.3);
}
@media (prefers-reduced-motion:reduce){
    .tg-btn{animation:none;}
}

.tg-cta{
    max-width:1200px;
    margin:40px auto 60px;
    padding:34px 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    text-align:center;
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
}
.tg-cta .eyebrow{margin-bottom:0;}

/* ---------- hero / player ---------- */
.hero{
    max-width:1200px;
    margin:auto;
    padding:96px 20px 40px;
}
.match-card{
    background:var(--panel);
    border:1px solid var(--line);
    overflow:hidden;
}
.player-wrap{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    background:#000;
}
.player-wrap iframe{
    width:100%;height:100%;border:none;display:block;
}
.overlay{
    position:absolute;
    top:18px;left:18px;
    display:flex;
    gap:8px;
    z-index:2;
}
.tag{
    font-family:'Oswald',sans-serif;
    font-size:12px;
    font-weight:600;
    letter-spacing:1px;
    padding:8px 16px 8px 12px;
    background:rgba(8,9,11,.75);
    backdrop-filter:blur(10px);
    clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);
}
.tag.live{
    background:var(--accent);
}

/* broadcast-style scoreboard strip */
.scoreboard{
    display:flex;
    align-items:stretch;
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    background:var(--panel-2);
}
.scoreboard .cell{
    padding:14px 22px;
    position:relative;
}
.scoreboard .cell + .cell{
    border-left:1px solid var(--line);
}
.scoreboard .cell::after{
    content:"";
    position:absolute;
    right:-1px;top:0;bottom:0;
    width:1px;
}
.eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:1.5px;
    color:var(--text-dim);
    text-transform:uppercase;
    margin-bottom:4px;
}
.league-name{
    font-family:'Oswald',sans-serif;
    font-size:15px;
    font-weight:600;
    letter-spacing:.4px;
}
.status-val{
    font-family:'JetBrains Mono',monospace;
    font-size:15px;
    font-weight:600;
    color:var(--accent-2);
}

.content{
    padding:28px 28px 32px;
}
.title{
    font-family:'Oswald',sans-serif;
    font-size:34px;
    font-weight:700;
    letter-spacing:.3px;
    line-height:1.15;
    text-transform:uppercase;
}

/* ---------- stats ---------- */
.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:1px;
    margin-top:26px;
    background:var(--line);
    border:1px solid var(--line);
}
.stat{
    background:var(--panel-2);
    padding:18px 20px;
    border-left:3px solid var(--accent);
}
.stat:nth-child(2){border-left-color:var(--accent-2);}
.stat:nth-child(3){border-left-color:var(--text-dim);}
.stat small{
    display:block;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:1.2px;
    text-transform:uppercase;
    color:var(--text-dim);
}
.stat h3{
    margin-top:8px;
    font-family:'Oswald',sans-serif;
    font-size:18px;
    font-weight:600;
}

@media(max-width:768px){
    .title{font-size:24px;}
    .stats{grid-template-columns:1fr;}
    .scoreboard{flex-direction:column;}
    .scoreboard .cell + .cell{border-left:none;border-top:1px solid var(--line);}
    .nav-right{gap:8px;}
    .tg-btn.small span.label{display:none;}
}
</style>
</head>
<body>
<header class="header">
    <div class="nav">
        <div class="logo"><span class="bar"></span>SPORTS LIVE</div>
        <div class="nav-right">
            <div class="air-badge"><span class="air-dot"></span><span>ON AIR</span></div>
            <a class="tg-btn small" href="https://t.me/Earnpoint10" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.5 2.5 2.7 10.1c-.9.4-.9 1.7.1 2l4.4 1.4 1.7 5.4c.3.9 1.5 1.1 2.1.3l2.5-3.1 4.6 3.4c.8.6 2 .2 2.2-.8l3.1-14.7c.2-1-.8-1.8-1.7-1.5zM9.8 13.9l-1-.3-.9-2.9 9.6-6-7.7 9.2z"/></svg>
                <span class="label">Join</span>
            </a>
        </div>
    </div>
</header>

<section class="hero">
<div class="match-card">

    <div class="player-wrap">
        <div class="overlay">
            <div class="tag live">LIVE</div>
            <div class="tag" id="league"></div>
        </div>
        <iframe id="player" allowfullscreen allow="encrypted-media; picture-in-picture"></iframe>
    </div>

    <div class="scoreboard">
        <div class="cell">
            <div class="eyebrow">Competition</div>
            <div class="league-name" id="leagueText"></div>
        </div>
        <div class="cell">
            <div class="eyebrow">Match status</div>
            <div class="status-val" id="status"></div>
        </div>
    </div>

    <div class="content">
        <h1 class="title" id="title"></h1>

        <div class="stats">
            <div class="stat">
                <small>Status</small>
                <h3 id="statusCard"></h3>
            </div>
            <div class="stat">
                <small>Quality</small>
                <h3>HD Stream</h3>
            </div>
            <div class="stat">
                <small>Platform</small>
                <h3>Vercel</h3>
            </div>
        </div>
    </div>

</div>
</section>

<div class="tg-cta">
    <div class="eyebrow">Stream stalled? Get instant updates</div>
    <a class="tg-btn large" href="https://t.me/Earnpoint10" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.5 2.5 2.7 10.1c-.9.4-.9 1.7.1 2l4.4 1.4 1.7 5.4c.3.9 1.5 1.1 2.1.3l2.5-3.1 4.6 3.4c.8.6 2 .2 2.2-.8l3.1-14.7c.2-1-.8-1.8-1.7-1.5zM9.8 13.9l-1-.3-.9-2.9 9.6-6-7.7 9.2z"/></svg>
        Join Telegram
    </a>
</div>

<script type="module">
import { STREAM } from './stream.js';
document.getElementById("player").src = STREAM.embedUrl;
document.getElementById("title").innerText = STREAM.title;
document.getElementById("status").innerText = STREAM.status;
document.getElementById("statusCard").innerText = STREAM.status;
document.getElementById("league").innerText = STREAM.league;
document.getElementById("leagueText").innerText = STREAM.league;
</script>
</body>
</html>
